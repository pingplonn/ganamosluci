<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #2D1F5E;
    background: radial-gradient(ellipse at top, #3A2470 0%, #1E1040 50%, #160C35 100%);
    font-family: 'Montserrat', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* LOGO */
  .logo {
    font-size: 36px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 2px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .logo .spade {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #8B5CF6, #6D28D9);
    border-radius: 8px;
    margin: 0 2px;
    font-size: 20px;
  }

  .logo .net {
    font-size: 14px;
    font-weight: 700;
    color: rgba(255,255,255,0.6);
    vertical-align: super;
    margin-left: 3px;
    letter-spacing: 1px;
  }

  /* ACCESO VIP */
  .vip-label {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 3px;
    color: #fff;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* BONO texto grande dorado */
  .bono-text {
    font-size: 88px;
    font-weight: 900;
    line-height: 0.9;
    letter-spacing: 2px;
    background: linear-gradient(180deg, #FFE066 0%, #F5A800 40%, #C87800 70%, #E8A000 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 4px 12px rgba(200,120,0,0.5));
    text-transform: uppercase;
  }

  .percent-text {
    font-size: 120px;
    font-weight: 900;
    line-height: 0.85;
    background: linear-gradient(180deg, #FFE066 0%, #F5A800 40%, #C87800 70%, #E8A000 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 6px 16px rgba(200,120,0,0.5));
    margin-bottom: 20px;
  }

  /* ESCRIBINOS BAR */
  .escribinos {
    width: 100%;
    background: #1A0F3A;
    border-radius: 8px;
    padding: 14px 20px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 2px;
    color: #fff;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* INPUT */
  .input-nombre {
    width: 100%;
    background: #241650;
    border: none;
    border-radius: 50px;
    padding: 18px 28px;
    font-size: 15px;
    font-family: 'Open Sans', sans-serif;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    outline: none;
    margin-bottom: 12px;
    text-align: center;
  }

  .input-nombre::placeholder {
    color: rgba(255,255,255,0.4);
  }

  /* CTA BUTTON */
  .cta-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    width: 100%;
    padding: 20px 28px;
    background: linear-gradient(135deg, #2DB84B, #25A040);
    border: none;
    border-radius: 50px;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 1px;
    text-decoration: none;
    text-transform: uppercase;
    cursor: pointer;
    line-height: 1.2;
    box-shadow: 0 8px 30px rgba(37,160,64,0.4);
  }

  .cta-btn:active { transform: scale(0.98); }

  .wa-circle {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .wa-circle svg {
    width: 24px;
    height: 24px;
    fill: #fff;
  }

/* Animaciones agregadas */
@keyframes floatingBonus {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

@keyframes pulseButton {
  0% { transform: scale(1); }
  50% { transform: scale(1.03); }
  100% { transform: scale(1); }
}

.bono-text,
.percent-text {
  animation: floatingBonus 3s ease-in-out infinite;
}

.cta-btn {
  animation: pulseButton 2.8s ease-in-out infinite;
}

</style>
